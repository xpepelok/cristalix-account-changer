name: Release

on:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v7

      - name: Read AppVersion
        id: version
        run: |
          appv="$(sed -nE 's/^const AppVersion = "(.*)"$/\1/p' internal/update/updater.go)"
          echo "AppVersion=$appv"
          if [ -z "$appv" ]; then
            echo "::error::failed to read AppVersion from internal/update/updater.go"
            exit 1
          fi
          echo "app_version=$appv" >> "$GITHUB_OUTPUT"

  windows:
    needs: guard
    runs-on: windows-latest
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: go build -trimpath -ldflags "-s -w -H=windowsgui -buildid=" -o out/AccountChanger.exe .

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: out/AccountChanger.exe
          if-no-files-found: error

  linux:
    needs: guard
    runs-on: ubuntu-latest
    container: golang:1.25-bookworm
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: go build -trimpath -ldflags "-s -w -buildid=" -o out/AccountChanger-linux-x86_64 .

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: out/AccountChanger-linux-x86_64
          if-no-files-found: error

  release:
    needs: [guard, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Check release notes
        run: |
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::RELEASE_NOTES.md is empty or missing"
            exit 1
          fi
          if grep -qi "TODO" RELEASE_NOTES.md; then
            echo "::error::RELEASE_NOTES.md still contains TODO"
            exit 1
          fi

      - name: Checksums
        working-directory: dist
        run: sha256sum AccountChanger.exe AccountChanger-linux-x86_64 > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.guard.outputs.app_version }}
          name: ${{ needs.guard.outputs.app_version }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/AccountChanger.exe
            dist/AccountChanger-linux-x86_64
            dist/checksums.txt
          draft: false
          prerelease: false
          make_latest: true
