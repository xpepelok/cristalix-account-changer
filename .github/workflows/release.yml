name: Release

on:
  push:
    tags: ["AccountChanger-*"]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Тег должен совпадать с AppVersion
        run: |
          tag="${GITHUB_REF_NAME#AccountChanger-}"
          appv="$(sed -nE 's/^const AppVersion = "(.*)"$/\1/p' internal/update/updater.go)"
          echo "тег=$tag  AppVersion=$appv"
          if [ -z "$appv" ]; then
            echo "::error::не смог прочитать AppVersion из internal/update/updater.go"
            exit 1
          fi
          if [ "$tag" != "$appv" ]; then
            echo "::error::тег $tag не совпадает с AppVersion $appv (internal/update/updater.go)"
            exit 1
          fi

  windows:
    needs: guard
    runs-on: windows-latest
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Сборка
        shell: bash
        run: go build -trimpath -ldflags "-s -w -H=windowsgui -buildid=" -o out/AccountChanger.exe .

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: out/AccountChanger.exe
          if-no-files-found: error

  linux:
    needs: guard
    runs-on: ubuntu-latest
    container: golang:1.25-bookworm
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Зависимости
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Сборка
        run: go build -trimpath -ldflags "-s -w -buildid=" -o out/AccountChanger-linux-x86_64 .

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: out/AccountChanger-linux-x86_64
          if-no-files-found: error

  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Контрольные суммы
        working-directory: dist
        run: sha256sum AccountChanger.exe AccountChanger-linux-x86_64 > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/AccountChanger.exe
            dist/AccountChanger-linux-x86_64
            dist/checksums.txt
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
