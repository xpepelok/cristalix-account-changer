name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # -unsafeptr=false: clipboard_windows.go и tray_windows.go передают uintptr
      # из Win32 (GlobalLock, LPARAM) — память не под управлением GC, это ложные срабатывания.
      - name: Vet
        run: go vet -unsafeptr=false ./...

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: go build -trimpath -ldflags "-s -w -H=windowsgui -buildid=" -o out/AccountChanger.exe .

  linux:
    runs-on: ubuntu-latest
    container: golang:1.25-bookworm
    env:
      GOTOOLCHAIN: local
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Deps
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Trust workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags "-s -w -buildid=" -o out/AccountChanger-linux-x86_64 .
